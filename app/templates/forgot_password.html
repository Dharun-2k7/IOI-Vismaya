{% extends "base.html" %}

{% block content %}
<div class="auth-wrap animate-up delay-1">
    <div class="card">
        <span class="section-eyebrow" style="text-align: center; display: block;">Account Recovery</span>
        <h2 class="auth-title text-gold">Forgot Password</h2>
        <p class="auth-sub">Enter your registered email address to receive a secure OTP to reset your password.</p>

        <form method="POST" action="{{ url_for('main.forgot_password') }}">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" name="email" placeholder="you@university.edu"
                    required>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">Send OTP</button>
        </form>

        <p class="auth-footer">
            Remembered your password? <a href="{{ url_for('main.login') }}">Back to Login</a>
        </p>
    </div>
</div>
{% endblock %}
