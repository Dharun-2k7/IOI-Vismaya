{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="card">
        <h2 style="color: var(--primary-blue); text-align: center; margin-bottom: 1.5rem;">Register for ICPC Club</h2>
        
        <form method="POST" action="{{ url_for('main.register') }}">
            <div class="form-group">
                <label class="form-label" for="full_name">Full Name</label>
                <input class="form-control" type="text" id="full_name" name="full_name" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input class="form-control" type="text" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="school">University / School Name</label>
                <input class="form-control" type="text" id="school" name="school" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="grade">Class / Grade (e.g., Year 2 CS)</label>
                <input class="form-control" type="text" id="grade" name="grade" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Register</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Already have an account? <a href="{{ url_for('main.login') }}" style="color: var(--primary-blue);">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
