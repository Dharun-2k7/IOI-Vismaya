{% extends "base.html" %}

{% block content %}
<div class="animate-up delay-1 page-hero">
    <span class="section-eyebrow">Organizing Team</span>
    <h1 class="text-gradient">Meet the Team</h1>
    <p>
        The architects and problem setters behind the ICPC Club Platform.
    </p>
</div>

<div class="grid-4">
    {% for i in range(1, 16) %}
    <!-- Team Member {{ i }} -->
    <div class="card team-card animate-up delay-{{ (i % 4) + 1 }}">
        <img class="team-avatar" src="https://api.dicebear.com/9.x/lorelei/svg?seed=Person{{ i }}" alt="Person {{ i }}" style="object-fit: cover;" />
        <h3>Person {{ i }}</h3>
        <p>Amrita Vishwa Vidyapeetham</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
