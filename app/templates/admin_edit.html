{% extends "base.html" %}

{% block content %}
<div class="dashboard-head animate-up delay-1">
    <h2>Edit Problem: {{ problem.title }}</h2>
    <a href="{{ url_for('main.admin_dashboard') }}" class="btn nav-btn-outline" style="margin-top: 1rem;">Back to Admin</a>
</div>

<div class="card animate-up delay-2" style="max-width: 900px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('main.edit_problem', problem_id=problem.id) }}">
        <div class="form-group">
            <label class="form-label">Problem Title</label>
            <input type="text" name="title" class="form-control" required value="{{ problem.title }}">
        </div>

        <div class="form-group">
            <label class="form-label">Problem Statement</label>
            <div id="editor-container" style="height: 300px; background: rgba(0,0,0,0.2); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 8px;"></div>
            <input type="hidden" name="statement" id="statement-input">
        </div>

        <div class="form-group">
            <label class="form-label">Correct Answer</label>
            <input type="text" name="correct_answer" class="form-control" required value="{{ problem.correct_answer }}">
        </div>

        <div class="form-group">
            <label class="form-label">Schedule Active Time (IST)</label>
            <input type="datetime-local" name="scheduled_for" class="form-control" style="color-scheme: dark;" value="{{ scheduled_for_ist_str }}">
            <small style="color: var(--text-muted); margin-top: 0.5rem; display: block;">If set, the problem will be deactivated and scheduled to unlock at this time (IST).</small>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
    </form>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script>
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Write the problem statement here...',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline', 'code-block'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'formula']
            ]
        }
    });

    // Load existing content
    quill.clipboard.dangerouslyPasteHTML(`{{ problem.statement | safe }}`);

    var form = document.querySelector('form');
    form.onsubmit = function() {
        var statementInput = document.querySelector('#statement-input');
        statementInput.value = quill.root.innerHTML;
    };
</script>
{% endblock %}
