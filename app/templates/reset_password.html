{% extends "base.html" %}

{% block content %}
<div class="auth-wrap animate-up delay-1">
    <div class="card">
        <span class="section-eyebrow" style="text-align: center; display: block;">Secure Access</span>
        <h2 class="auth-title text-gold">Reset Password</h2>
        <p class="auth-sub">We sent a secure 6-digit code to <strong>{{ email }}</strong>.</p>

        <form method="POST" action="{{ url_for('main.reset_password') }}">
            <div class="form-group">
                <label class="form-label" for="otp">Enter your code</label>
                <input class="form-control" type="text" id="otp" name="otp" placeholder="1 2 3 4 5 6"
                    style="letter-spacing: 5px; text-align: center; font-size: 1.2rem; font-weight: bold;" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">New Password</label>
                <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">Reset & Login</button>
        </form>

        <p class="auth-footer">
            Didn't receive it? <a href="{{ url_for('main.forgot_password') }}">Try another email</a>
        </p>
    </div>
</div>
{% endblock %}
