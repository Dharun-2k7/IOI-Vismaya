{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <div class="card">
        <h2 style="color: var(--primary-blue); text-align: center; margin-bottom: 1rem;">Verify Your Email</h2>
        
        <p style="text-align: center; margin-bottom: 1.5rem; color: var(--text-muted);">
            We sent a 6-digit verification code to <strong>{{ email }}</strong>. 
            Please enter it below.
        </p>
        
        <form method="POST" action="{{ url_for('main.verify') }}">
            <div class="form-group">
                <label class="form-label" for="otp">Verification Code</label>
                <input class="form-control" type="text" id="otp" name="otp" placeholder="123456" required autocomplete="off">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Verify Email</button>
        </form>
    </div>
</div>
{% endblock %}
