{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <div class="card">
        <h2 style="color: var(--primary-blue); text-align: center; margin-bottom: 1.5rem;">Login</h2>
        
        <form method="POST" action="{{ url_for('main.login') }}">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input class="form-control" type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Don't have an account? <a href="{{ url_for('main.register') }}" style="color: var(--primary-blue);">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
